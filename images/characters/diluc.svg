<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0c0c14"/>
    </radialGradient>
    <radialGradient id="elementGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7043" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff7043" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" stroke="#ff7043" stroke-width="3"/>

  <!-- Element glow -->
  <circle cx="100" cy="100" r="80" fill="url(#elementGrad)"/>

  <!-- Decorative ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#ff7043" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#ff7043" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Character initial -->
  <text x="100" y="115" font-family="Noto Sans SC, Microsoft YaHei, sans-serif" font-size="72"
        font-weight="bold" fill="#ff7043" text-anchor="middle">迪</text>

  <!-- Element symbol at bottom -->
  <circle cx="100" cy="165" r="15" fill="#0c0c14" stroke="#ff7043" stroke-width="2"/>
  <text x="100" y="171" font-family="sans-serif" font-size="14" fill="#ff7043" text-anchor="middle">火</text>
</svg>